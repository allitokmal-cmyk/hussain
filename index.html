<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Al Wafa Star - Reports &amp; Forms</title>
    
    <!-- PWA primary configs -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Al Wafa Star" />
    <link rel="icon" type="image/png" href="/app-logo.png" />
    <link rel="apple-touch-icon" href="/app-logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Capture PWA install prompt early before React mounts -->
    <script>
      window.deferredPWAInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPWAInstallPrompt = e;
      });
    </script>

    <!-- Automatic service worker bootstrapper for reliable offline registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('Al Wafa Star PWA ServiceWorker registered with scope: ', registration.scope);
            })
            .catch((error) => {
              console.error('Al Wafa Star PWA ServiceWorker registration failed: ', error);
            });
        });
      }
    </script>
  </body>
</html>
